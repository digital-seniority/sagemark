# CI for the sagemark monorepo (pnpm + turbo).
#
# Closes audit-001 (A.005.4): "no CI runs the tests at all." This workflow is
# the regression backstop — every PR (and push) to `preview`/`main` must pass
# typecheck, lint, the full `turbo run test` suite (vitest in @sagemark/core and
# @sagemark/seo), the `node:test` RLS contract suite (which vitest excludes), the
# consuming-app build (DR-008), and the worker-env lint (DR-001 / PR 001 AC#3 —
# the "fails-the-build" half that was previously never invoked).
name: CI

"on":
  pull_request:
    branches: [preview, main]
  push:
    branches: [preview, main]

# A newer push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    env:
      # Tier-2 of the RLS contract suite (live Postgres / cross-tenant / FK /
      # CHECK behavioral assertions) runs ONLY when this secret is set. It is the
      # Supabase project DSN (DR-012) and is OPTIONAL: when the secret is unset
      # the env var is empty, the suite's runner auto-detect finds no engine, and
      # every Tier-2 test SKIPS cleanly (it is never falsely passed). Tier-1
      # static assertions always run regardless.
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # `turbo run test` fans out to every workspace `test` script. @sagemark/seo's
      # `test` runs vitest AND `node --test … rls-contract … token-scope` (Tier-1
      # static assertions; Tier-2 SKIPS here because turbo does NOT pass DATABASE_URL
      # through — the live anon-isolation Tier-2 is the dedicated step below, so it
      # runs ONCE against the live DB, not redundantly in two steps).
      - name: Test (turbo)
        run: pnpm test

      # Explicit RLS + token-scope contract run. Tier-1 (static migration-shape
      # assertions) ALWAYS runs and fails the build on a tenancy/RLS regression.
      # Tier-2 runs against DATABASE_URL when the secret is set (the job-level
      # `DATABASE_URL` env above reaches this step directly), otherwise skips
      # cleanly. token-scope's Tier-2 is the LOAD-BEARING anon-isolation proof
      # for P1.C.1's tokenized review tables (review_tokens + comment_threads →
      # anon reads ZERO rows); it MUST execute live here (audit-005 H3/M5).
      # --test-concurrency=1: rls-contract + token-scope both CREATE ROLE anon +
      # GRANT in their before-hooks; running the two files concurrently against the
      # one live DB races the shared catalog tuple ("tuple concurrently updated").
      # Serialize them.
      - name: RLS + token-scope contract suite (node:test)
        run: >-
          node --test --test-concurrency=1
          apps/seo/test/tenancy/rls-contract.test.ts
          apps/seo/test/review/token-scope.test.ts

      # Reachability gate (PR 016 / P1.R.2). The both-directions invariant:
      # sitemap == published+indexable set — no draft/archived URL leaks INTO the
      # sitemap, and no published piece is ORPHANED out of it. This file is also
      # covered by the `turbo run test` step above (vitest globs test/render/**);
      # this explicit, focused run is the DISTINCT failing signal the "CI gate"
      # calls for, so a reachability regression names itself in the build log
      # rather than hiding inside the aggregate suite. Rollback: delete this step.
      - name: Reachability gate (sitemap == indexable set, both directions)
        run: pnpm --filter @sagemark/seo exec vitest run test/render/reachability-gate.test.ts

      # Consuming-app build (DR-008): the source-consumed packages are validated
      # by actually building the app that consumes them.
      - name: Build (consuming app + packages)
        run: pnpm build

      # worker-env lint (DR-001 / PR 001 AC#3). assertWorkerEnvClean throws — and
      # the process exits non-zero — if a worker-bound env/config pairs a raw
      # Anthropic endpoint with a provider key (a metered-Gateway bypass). This is
      # the build-time backstop that turns that check into a failing build.
      - name: Worker env lint (Gateway-bypass guard)
        run: >-
          node --input-type=module --eval
          "import { assertWorkerEnvClean } from './packages/core/src/ai/worker-env-lint.ts';
          assertWorkerEnvClean(process.env);
          console.log('worker-env-lint: clean');"

      # gate-path lint (DR-013). assertGatePathGatewayOnly throws — and the
      # process exits non-zero — if a gate source resolves a model WITHOUT
      # forceGateway, i.e. re-introduces a path that could reach the direct-
      # Anthropic BYOK branch and escape the metered Gateway. Mirrors the
      # worker-env-lint backstop at the gate layer (prerequisite for PR 020).
      #
      # The gate set is GLOB-DISCOVERED (audit-005 H4): every
      # packages/core/src/gates/*-gate.ts that resolves a model is scanned, so a
      # NEW gate cannot silently escape the cost ledger by being absent from a
      # hardcoded list. process.cwd() is the repo root (the CI step's CWD).
      - name: Gate-path lint (Gateway-only-metered guard)
        run: >-
          node --input-type=module --eval
          "import { assertGatePathGatewayOnly, readDiscoveredGateSources } from './packages/core/src/ai/gate-path-lint.ts';
          const sources = readDiscoveredGateSources(process.cwd());
          if (Object.keys(sources).length === 0) { throw new Error('gate-path-lint: discovered ZERO gate sources — discovery is broken'); }
          assertGatePathGatewayOnly(sources);
          console.log('gate-path-lint: clean (' + Object.keys(sources).length + ' gate sources discovered)');"
